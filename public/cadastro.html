<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Receitoteca — Cadastro</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/cards.css">
  <link rel="stylesheet" href="css/components/forms.css">
  <link rel="stylesheet" href="css/components/profile.css">
</head>
<body>
  <div class="bg-img" aria-hidden="true"></div>

  <header class="top-bar">
    <img src="images/logo2.png" alt="Receitoteca">
  </header>

  <main class="page-wrapper">
    <section class="card2" aria-labelledby="cadTitle">
      <h1 id="cadTitle">Cadastre-se</h1>
      <p class="lead">Aproveite essa oportunidade e torne-se membro da maior biblioteca de receitas do Brasil.</p>

      <div class="perfil-box" role="radiogroup" aria-label="Qual seu perfil?">
        <label class="perfil-opcao">
          <input type="radio" name="perfil" value="chef" checked>
          <div>
            <strong>Chef</strong> — anuncie suas receitas e dissemine o seu trabalho
          </div>
        </label>

        <label class="perfil-opcao">
          <input type="radio" name="perfil" value="usuario">
          <div>
            <strong>Entusiasta</strong> — conheça novas receitas, novos chefs e dê seus feedbacks
          </div>
        </label>
      </div>

      <form id="cadastroForm" class="form" novalidate>
        <div class="form-row">
          <label for="nome">Nome:</label>
          <input id="nome" type="text" placeholder="Digite seu nome" required>
        </div>

        <div class="form-row">
          <label for="email">E-mail:</label>
          <input id="email" type="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="form-row">
          <label for="senha">Senha:</label>
          <input id="senha" type="password" placeholder="Digite uma senha" required>
        </div>

        <ul class="requisitos" aria-hidden="false">
          <li id="req-min">● 6 caracteres no mínimo</li>
          <li id="req-num">● 1 dígito</li>
          <li id="req-minu">● 1 minúscula</li>
          <li id="req-maiu">● 1 maiúscula</li>
          <li id="req-esp">● 1 caractere especial (! @ # $)</li>
        </ul>

        <div class="form-row">
          <label for="senha2">Confirmação da senha:</label>
          <input id="senha2" type="password" placeholder="Digite novamente sua senha" required>
        </div>

        <p id="erroSenha" class="erro" aria-live="polite"></p>

        <div class="form-row">
          <button type="submit" class="btn">Cadastrar &gt;</button>
        </div>
      </form>

      <p style="text-align:center; margin-top:16px; font-size:14px; color:#666;">
        Já tem conta? <a href="login.html" style="color:#e70731; font-weight:600;">Entrar</a>
      </p>
    </section>
  </main>

  <script type="module">
    import { cadastrarChef, cadastrarUsuario } from './js/api.js';

    const senha = document.getElementById('senha');
    const senha2 = document.getElementById('senha2');
    const erroSenha = document.getElementById('erroSenha');

    function checkRequisitos(val) {
      document.getElementById('req-min').classList.toggle('ok', val.length >= 6);
      document.getElementById('req-num').classList.toggle('ok', /[0-9]/.test(val));
      document.getElementById('req-minu').classList.toggle('ok', /[a-z]/.test(val));
      document.getElementById('req-maiu').classList.toggle('ok', /[A-Z]/.test(val));
      document.getElementById('req-esp').classList.toggle('ok', /[!@#$]/.test(val));
    }

    senha.addEventListener('input', (e) => {
      checkRequisitos(e.target.value);
      erroSenha.textContent = '';
    });

    document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const val = senha.value;
      const val2 = senha2.value;
      const meets = val.length >= 6 && /[0-9]/.test(val) && /[a-z]/.test(val) && /[A-Z]/.test(val) && /[!@#$]/.test(val);

      if (!meets) {
        erroSenha.textContent = 'A senha não atende todos os requisitos.';
        return;
      }
      if (val !== val2) {
        erroSenha.textContent = 'As senhas não coincidem!';
        return;
      }

      const perfil = document.querySelector('input[name="perfil"]:checked').value;
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;

      try {
        let dados;
        if (perfil === 'chef') {
          dados = await cadastrarChef(nome, email, val);
          localStorage.setItem('token', dados.token);
          localStorage.setItem('tipo', 'chef');
          localStorage.setItem('nome', dados.chef.nome);
          localStorage.setItem('id', dados.chef.id);
        } else {
          dados = await cadastrarUsuario(nome, email, val);
          localStorage.setItem('token', dados.token);
          localStorage.setItem('tipo', 'usuario');
          localStorage.setItem('nome', dados.usuario.nome);
          localStorage.setItem('id', dados.usuario.id);
        }

        window.location.href = 'paginainicial.html';
      } catch (err) {
        erroSenha.textContent = err.message;
      }
    });
  </script>
</body>
</html>
