<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Receitoteca — Entrar</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/cards.css">
  <link rel="stylesheet" href="css/components/forms.css">
  <link rel="stylesheet" href="css/components/profile.css">
</head>
<body>
  <div class="bg-img" aria-hidden="true"></div>

  <header class="top-bar">
    <img src="images/logo2.png" alt="Receitoteca">
  </header>

  <main class="page-wrapper">
    <section class="card2" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Entrar</h1>
      <p class="lead">Já é membro do Receitoteca? Entre na sua conta já cadastrada e aproveite os benefícios!</p>

      <div class="perfil-box" role="radiogroup" aria-label="Tipo de conta">
        <label class="perfil-opcao">
          <input type="radio" name="tipo" value="chef">
          <div><strong>Chef</strong> — publicar e gerenciar receitas</div>
        </label>
        <label class="perfil-opcao">
          <input type="radio" name="tipo" value="usuario" checked>
          <div><strong>Entusiasta</strong> — favoritar e explorar receitas</div>
        </label>
      </div>

      <form id="loginForm" class="form">
        <div class="form-row">
          <label for="loginEmail">E-mail:</label>
          <input id="loginEmail" type="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="form-row">
          <label for="loginSenha">Senha:</label>
          <input id="loginSenha" type="password" placeholder="Digite sua senha" required>
        </div>

        <p id="erroLogin" style="color:#e70731; font-size:14px; margin-bottom:8px;"></p>

        <div class="form-row">
          <button type="submit" class="btn">Entrar &gt;</button>
        </div>
      </form>

      <p style="text-align:center; margin-top:16px; font-size:14px; color:#666;">
        Não tem conta? <a href="cadastro.html" style="color:#e70731; font-weight:600;">Cadastre-se</a>
      </p>
    </section>
  </main>

  <script type="module">
    import { loginUsuario, loginChef } from './js/api.js';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const tipo = document.querySelector('input[name="tipo"]:checked').value;
      const email = document.getElementById('loginEmail').value;
      const senha = document.getElementById('loginSenha').value;
      const erroEl = document.getElementById('erroLogin');

      try {
        let dados;
        if (tipo === 'chef') {
          dados = await loginChef(email, senha);
          localStorage.setItem('token', dados.token);
          localStorage.setItem('tipo', 'chef');
          localStorage.setItem('nome', dados.chef.nome);
          localStorage.setItem('id', dados.chef.id);
        } else {
          dados = await loginUsuario(email, senha);
          localStorage.setItem('token', dados.token);
          localStorage.setItem('tipo', 'usuario');
          localStorage.setItem('nome', dados.usuario.nome);
          localStorage.setItem('id', dados.usuario.id);
        }

        window.location.href = 'paginainicial.html';
      } catch (err) {
        erroEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
