<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Receitoteca — Entrar</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/cards.css">
  <link rel="stylesheet" href="css/components/forms.css">
</head>
<body>
  <div class="bg-img" aria-hidden="true"></div>

  <header class="top-bar">
    <img src="images/logo2.png" alt="Receitoteca">
  </header>

  <main class="page-wrapper">
    <section class="card" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Entrar</h1>
      <p class="lead">Já é membro do Receitoteca? Entre na sua conta já cadastrada e aproveite os benefícios!</p>

      <form id="loginForm" class="form">
        <div class="form-row">
          <label for="loginEmail">E-mail:</label>
          <input id="loginEmail" type="email" placeholder="Digite seu melhor e-mail" required>
        </div>

        <div class="form-row">
          <label for="loginSenha">Senha:</label>
          <input id="loginSenha" type="password" placeholder="Digite uma senha" required>
        </div>

        <div class="form-row">
          <button type="submit" class="btn">Entrar &gt;</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Tentativa de login (demo). Integre com backend para autenticar.');
    });
  </script>
</body>
</html>
